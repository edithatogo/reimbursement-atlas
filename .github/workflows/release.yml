name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.10.0
      - name: Build package
        run: uv build
      - name: Generate archive
        run: git archive --format=tar.gz --output=reimbursement-atlas-${{ github.ref_name }}.tar.gz HEAD
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            reimbursement-atlas-${{ github.ref_name }}.tar.gz
