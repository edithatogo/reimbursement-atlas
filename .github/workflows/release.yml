name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
      - name: Generate SBOMs
        run: pixi run sbom
      - name: Build package
        run: uv build
      - name: Generate archive
        run: |
          archive_name="reimbursement-atlas-${GITHUB_REF_NAME}.tar.gz"
          git archive --format=tar.gz --output="$archive_name" HEAD
      - name: Attest Python distributions
        uses: actions/attest@v4
        with:
          subject-path: dist/*
      - name: Attest source archive
        uses: actions/attest@v4
        with:
          subject-path: reimbursement-atlas-*.tar.gz
      - name: Attest SBOMs
        uses: actions/attest@v4
        with:
          subject-path: data/derived/sbom/*.json
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            reimbursement-atlas-*.tar.gz
            data/derived/sbom/*.json
