name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Require release governance gates
        env:
          PYTHONPATH: src
        run: |
          set -euo pipefail
          pixi run release-readiness
          pixi run public-data-policy
          pixi run licence-review-validate
          pixi run action-pin-policy

  build:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Generate SBOMs
        run: pixi run sbom
      - name: Build package
        run: uv build
      - name: Generate archive
        run: |
          archive_name="reimbursement-atlas-${GITHUB_REF_NAME}.tar.gz"
          git archive --format=tar.gz --output="$archive_name" HEAD
      - name: Generate deterministic release manifest
        run: |
          python scripts/make_release_manifest.py \
            --output release-manifest.json \
            --tag "$GITHUB_REF_NAME" \
            --commit "$GITHUB_SHA" \
            --artifact dist/* \
            --artifact reimbursement-atlas-*.tar.gz \
            --artifact data/derived/sbom/*.json
      - name: Attest Python distributions
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: dist/*
      - name: Attest source archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: reimbursement-atlas-*.tar.gz
      - name: Attest SBOMs
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: data/derived/sbom/*.json
      - name: Attest release manifest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release-manifest.json
      - name: Verify release attestations before upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          signer="${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          for artifact in dist/* reimbursement-atlas-*.tar.gz data/derived/sbom/*.json release-manifest.json; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer" \
              --source-ref "$GITHUB_REF" \
              --deny-self-hosted-runners
          done
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            dist/*
            reimbursement-atlas-*.tar.gz
            data/derived/sbom/*.json
            release-manifest.json
