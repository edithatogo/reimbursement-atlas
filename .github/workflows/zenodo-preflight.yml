name: Zenodo preflight

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Non-mutating mode until all upstream gates pass
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Validate Zenodo metadata
        run: pixi run zenodo-metadata && pixi run zenodo-draft
      - name: Validate repository readiness
        run: |
          pixi run release-readiness
          pixi run public-data-policy
          pixi run action-pin-policy
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zenodo-preflight-${{ github.run_id }}
          path: data/derived/zenodo/
          retention-days: 30
