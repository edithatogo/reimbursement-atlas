name: Zenodo preflight

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Validate Zenodo metadata
        run: pixi run zenodo-metadata
      - name: Validate repository readiness
        run: |
          pixi run release-readiness
          pixi run public-data-policy
          pixi run action-pin-policy
      - name: Record non-depositing boundary
        run: |
          mkdir -p data/derived/zenodo
          printf '%s\n' '{"schema_version":"zenodo-preflight-v1","status":"validated_non_depositing","mutation_performed":false,"doi_created":false,"human_publication_approval_required":true}' > data/derived/zenodo/preflight.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zenodo-preflight-${{ github.run_id }}
          path: data/derived/zenodo/preflight.json
          retention-days: 30
