name: Action pin maintenance

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: action-pin-maintenance
  cancel-in-progress: true

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHONPATH: src
      PIN_BRANCH: automation/action-pin-updates
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Resolve and apply complete pin set
        id: pins
        run: |
          set +e
          pixi run action-pin-resolution
          resolution_status=$?
          set -e
          test "$resolution_status" -eq 0
          pixi run python scripts/apply_action_pin_resolutions.py \
            --report data/derived/repo_automation/action_pin_maintenance.json
      - name: Detect workflow changes
        id: changes
        run: |
          if git diff --quiet -- .github/workflows; then
            echo "All external actions are already immutably pinned."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Avoid duplicate maintenance PRs
        id: existing
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          existing="$(gh pr list --base main --head "$PIN_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            echo "An action-pin maintenance PR is already open: #$existing"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Open action-pin maintenance PR
        if: steps.changes.outputs.has_changes == 'true' && steps.existing.outputs.exists == 'false'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$PIN_BRANCH"
          git add .github/workflows
          git commit -m "chore(ci): refresh immutable action pins"
          git push --force-with-lease origin "HEAD:$PIN_BRANCH"
          gh pr create \
            --base main \
            --head "$PIN_BRANCH" \
            --title "chore(ci): refresh immutable action pins" \
            --body "Automated candidate generated by the fail-closed action-pin maintenance workflow. Review the resolved commit SHAs and require the full CI/security matrix before merging."
      - name: Upload resolver evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: action-pin-maintenance-${{ github.run_id }}
          path: data/derived/repo_automation/action_pin_maintenance.json
          if-no-files-found: warn
          retention-days: 30
