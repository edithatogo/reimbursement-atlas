name: Dashboard browser matrix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-browser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Install Playwright browser engines
        working-directory: apps/dashboard
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
      - name: Run browser matrix
        working-directory: apps/dashboard
        run: npm run test:browser
      - name: Upload browser review evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-browser-review-${{ github.run_id }}
          path: |
            apps/test-results/
            apps/playwright-report/
          if-no-files-found: warn
          retention-days: 30
