name: Dashboard preview build

on:
  pull_request:
    paths:
      - "apps/dashboard/**"
      - "data/seed/**"
      - "data/derived/vertical_slice/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package.json
      - uses: prefix-dev/setup-pixi@v0.10.0
      - name: Generate dashboard seed data
        run: |
          pixi run graph-seed
          pixi run readiness
          pixi run ingestion-plan
          pixi run acquisition-plan
          pixi run vertical-slice
          pixi run source-snapshots
          pixi run dashboard-seed
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm install
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
