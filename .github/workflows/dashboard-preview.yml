name: Dashboard preview build

on:
  pull_request:
    paths:
      - "apps/dashboard/**"
      - "data/seed/**"
      - "data/derived/vertical_slice/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Generate dashboard seed data
        run: |
          pixi run graph-seed
          pixi run readiness
          pixi run ingestion-plan
          pixi run acquisition-plan
          pixi run vertical-slice
          pixi run source-snapshots
          pixi run repo-automation
          pixi run sbom
          pixi run architecture-report
          pixi run dashboard-seed
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
