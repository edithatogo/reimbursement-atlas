name: Mutation testing

on:
  schedule:
    - cron: "41 14 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@v0.10.0
      - run: pixi run mutation
