name: Data smoke

on:
  # This job is a required branch-protection context and must be emitted for
  # documentation-only pull requests as well as data/code changes.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Validate seed registries
        run: pixi run seed-validate
      - name: Public data policy
        run: pixi run public-data-policy
      - name: Export JSON schemas
        run: pixi run schema-export
      - name: Generate no-network data artefacts
        run: |
          pixi run readiness
          pixi run ingestion-plan
          pixi run acquisition-plan
          pixi run vertical-slice
          pixi run source-snapshots
          pixi run ontology-seed
          pixi run seed-sync
          pixi run seed-sync-check
          pixi run publication-manifest
          pixi run architecture-report
          pixi run source-validation
          pixi run source-contracts
          pixi run github-project-export
          pixi run final-handoff
          pixi run protocol-status
          pixi run roadmap-linkages
          pixi run data-quality
          pixi run data-dictionary
          pixi run evidence-readiness
          pixi run source-drift
          pixi run release-readiness || true
          pixi run seed-lake
