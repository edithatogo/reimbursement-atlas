name: Hugging Face destination metadata

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: huggingface-destination-metadata
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: src
      HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO || 'edithatogo/reimbursement-atlas' }}
      HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO || 'edithatogo/reimbursement-atlas' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify public destination metadata without credentials
        run: |
          set -euo pipefail
          python scripts/check_huggingface_destination.py \
            --dataset-repo "$HF_DATASET_REPO" \
            --space-repo "$HF_SPACE_REPO" \
            --output data/derived/publication/huggingface_destination_check.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: huggingface-destination-${{ github.run_id }}
          path: data/derived/publication/huggingface_destination_check.json
          if-no-files-found: error
          retention-days: 30
      - name: Synchronize issue 320 with read-only drift evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="data/derived/publication/huggingface_destination_check.json"
          test -f "$report"
          body="$(printf 'Automated Hugging Face destination metadata monitor.\n\nRead-only evidence from %s/%s/actions/runs/%s:\n\n%s' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" "$(cat "$report")")"
          gh issue edit 320 --repo "$GITHUB_REPOSITORY" --body "$body"
