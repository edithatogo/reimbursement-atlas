name: Workflow security analysis

on:
  pull_request:
    paths:
      - ".github/**"
      - "scripts/make_repo_automation_matrix.py"
      - "src/reimburse_atlas/automation.py"
  push:
    branches: [main]
    paths:
      - ".github/**"
  schedule:
    - cron: "23 2 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Generate repository automation policy matrix
        run: pixi run repo-automation
      - name: Generate action SHA resolution evidence
        run: pixi run action-pin-resolution || true
      - name: Upload workflow policy artefacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: workflow-policy
          path: data/derived/repo_automation/
          retention-days: 14

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Run zizmor GitHub Actions audit
        run: |
          uv tool run zizmor --min-severity medium --format sarif .github > zizmor.sarif || true
      - name: Upload zizmor SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: zizmor.sarif
