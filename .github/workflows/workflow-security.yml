name: Workflow security analysis

on:
  pull_request:
    paths:
      - ".github/**"
      - "scripts/make_repo_automation_matrix.py"
      - "src/reimburse_atlas/automation.py"
  push:
    branches: [main]
    paths:
      - ".github/**"
  schedule:
    - cron: "23 2 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Generate repository automation policy matrix
        run: pixi run repo-automation
      - name: Generate action SHA resolution evidence
        run: pixi run action-pin-resolution || true
      - name: Upload workflow policy artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: workflow-policy
          path: data/derived/repo_automation/
          retention-days: 14

  zizmor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Run zizmor GitHub Actions audit
        run: |
          uv tool run zizmor==1.26.1 --min-severity medium --format sarif .github > zizmor.sarif
      - name: Upload zizmor SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: zizmor.sarif
