name: Repository automation checks

on:
  pull_request:
    paths:
      - "conductor/**"
      - "data/seed/**"
      - "src/reimburse_atlas/**"
      - "scripts/**"
      - "apps/dashboard/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generated-artifacts:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Regenerate schemas, graph, readiness, ingestion plan and vertical slice
        run: |
          pixi run schema-export
          pixi run graph-seed
          pixi run readiness
          pixi run ingestion-plan
          pixi run acquisition-plan
          pixi run vertical-slice
          pixi run source-snapshots
          pixi run repo-automation
          pixi run sbom
          pixi run architecture-report
          pixi run source-validation
          pixi run source-contracts
          pixi run github-project-export
          pixi run final-handoff
          pixi run protocol-status
          pixi run roadmap-linkages
          pixi run data-quality
          pixi run data-dictionary
          pixi run evidence-readiness
          pixi run source-drift
          pixi run release-readiness || true
          pixi run seed-lake
          pixi run dashboard-seed
          pixi run project-issues
      - name: Ensure generated files are committed
        run: |
          git diff --stat
          git diff --exit-code
