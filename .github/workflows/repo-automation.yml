name: Repository automation checks

on:
  # Generated-artifact parity is required for every pull request, including
  # documentation-only changes, so branch protection always receives a result.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generated-artifacts:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0, persist-credentials: false}
        # Full history is required to verify the commit-bound dashboard review receipt.
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Regenerate schemas, graph, readiness, ingestion plan and vertical slice
        run: |
          pixi run schema-export
          pixi run graph-seed
          pixi run readiness
          pixi run ingestion-plan
          pixi run acquisition-plan
          pixi run vertical-slice
          pixi run source-snapshots
          pixi run repo-automation
          pixi run sbom
          pixi run architecture-report
          pixi run source-validation
          pixi run source-contracts
          pixi run historical-sources
          pixi run local-quality
          pixi run project-issues
          pixi run github-project-export
          pixi run osf-plan
          pixi run final-handoff
          pixi run protocol-status
          pixi run roadmap-linkages
          pixi run data-quality
          pixi run data-dictionary
          pixi run research-claim-packages
          pixi run evidence-readiness
          pixi run source-drift
          pixi run release-readiness || true
          pixi run research-package
          pixi run licence-review-queue
          # Reconcile checksum-bound decisions after queue regeneration so CI
          # cannot validate or publish a stale approval ledger.
          pixi run licence-review-reconcile
          pixi run licence-review-validate
          pixi run licence-decision-matrix
          pixi run review-schemas
          pixi run local-parser-contracts
          pixi run mapping-power-calculation
          pixi run mapping-candidate-frame
          pixi run mapping-active-review-packets
          pixi run mapping-active-review-ledger
          pixi run mapping-active-adjudication
          pixi run mapping-active-split
          pixi run mapping-active-evaluation
          pixi run mapping-cycle-registry
          pixi run fuzzy-benchmark
          pixi run seed-lake
          pixi run dashboard-seed
          # Generate the public status projection last, after all checksum-bound
          # artefacts and the authoritative decision ledger have settled.
          pixi run dashboard-status
          pixi run dashboard-owner-review-packet
          pixi run dashboard-review-current
          pixi run zenodo-draft
          pixi run zenodo-deposition-plan
      - name: Ensure generated files are committed
        run: |
          git diff --stat
          git diff --exit-code
