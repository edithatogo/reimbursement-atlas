name: Publish dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    tags:
      - "dashboard-v*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Regenerate public status
        run: |
          uv sync --all-extras
          uv run --all-extras python scripts/make_public_status_manifest.py
          uv run --all-extras python scripts/check_public_data_policy.py
      - name: Build dashboard
        working-directory: apps/dashboard
        run: |
          npm ci
          npm run build
      - name: Validate dashboard public quality
        run: uv run --all-extras python scripts/check_dashboard_quality.py
      - name: Validate dashboard routes
        run: uv run --all-extras python scripts/check_dashboard_routes.py
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: apps/dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
