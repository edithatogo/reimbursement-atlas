name: Publish dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "dashboard-v*"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # zizmor: ignore[cache-poisoning]
        with:
          node-version: 24
          cache: ""
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Regenerate public status
        run: |
          uv sync --all-extras
          uv run --all-extras python scripts/make_public_status_manifest.py
          uv run --all-extras python scripts/check_public_data_policy.py
      - name: Build dashboard
        working-directory: apps/dashboard
        run: |
          npm ci
          npm run build
          npx playwright install --with-deps chromium
      - name: Validate dashboard public quality
        run: uv run --all-extras python scripts/check_dashboard_quality.py
      - name: Validate dashboard routes
        run: uv run --all-extras python scripts/check_dashboard_routes.py
      - name: Browser smoke gate
        working-directory: apps/dashboard
        run: npm run test:browser
      - name: Upload dashboard review evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-review-evidence-${{ github.run_id }}
          path: |
            apps/dashboard/playwright-report/
            apps/dashboard/test-results/
          if-no-files-found: warn
          retention-days: 30
      - name: Build GitHub Pages artifact
        working-directory: apps/dashboard
        env:
          PUBLIC_DEPLOY_TARGET: github-pages
        run: npm run build
      - name: Validate GitHub Pages asset prefixes
        run: uv run --all-extras python scripts/check_dashboard_pages_assets.py
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  live-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Verify deployed dashboard
        run: python scripts/check_live_pages.py
