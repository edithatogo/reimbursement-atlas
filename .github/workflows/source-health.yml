name: Source health and drift monitor

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      PYTHONPATH: src
      PBS_API_SUBSCRIPTION_KEY: ${{ secrets.PBS_API_SUBSCRIPTION_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Attempt hardened source acquisition
        id: source_acquisition
        continue-on-error: true
        run: pixi run source-download-attempt
      - name: Record acquisition outcome
        if: always()
        env:
          ACQUISITION_OUTCOME: ${{ steps.source_acquisition.outcome }}
        run: |
          set -euo pipefail
          mkdir -p data/derived/source_health
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("data/derived/source_health/monitor_run_status.json").write_text(
              json.dumps(
                  {
                      "schema_version": "source-health-monitor-run-v1",
                      "acquisition_outcome": os.environ.get("ACQUISITION_OUTCOME", "unknown"),
                      "evidence_generation_attempted": False,
                      "mutation_performed": False,
                  },
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          PY
      - name: Generate source health evidence
        if: always()
        run: |
          set +e
          pixi run source-validation
          validation_status=$?
          pixi run source-contracts
          contracts_status=$?
          pixi run source-drift
          drift_status=$?
          pixi run release-readiness
          readiness_status=$?
          python - "$validation_status" "$contracts_status" "$drift_status" "$readiness_status" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("data/derived/source_health/monitor_run_status.json")
          payload = json.loads(path.read_text(encoding="utf-8"))
          payload.update(
              {
                  "evidence_generation_attempted": True,
                  "gate_return_codes": {
                      "source_validation": int(sys.argv[1]),
                      "source_contracts": int(sys.argv[2]),
                      "source_drift": int(sys.argv[3]),
                      "release_readiness": int(sys.argv[4]),
                  },
              }
          )
          path.write_text(json.dumps(payload, sort_keys=True) + "\n", encoding="utf-8")
          PY
          exit 0
      - name: Generate acquisition escalation report
        if: always()
        run: |
          set -euo pipefail
          pixi run final-handoff || true
          pixi run source-health-report
      - name: Enforce source health summary
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          checks = {
              "source_content_validation": Path("data/derived/source_validation/summary.json"),
              "source_contract_validation": Path("data/derived/source_contracts/summary.json"),
              "source_drift": Path("data/derived/source_drift/summary.json"),
              "release_readiness": Path("data/derived/release_readiness/summary.json"),
          }
          failures = []
          run_status_path = Path("data/derived/source_health/monitor_run_status.json")
          if not run_status_path.exists():
              failures.append("monitor_run_status: missing")
          else:
              run_status = json.loads(run_status_path.read_text(encoding="utf-8"))
              if run_status.get("acquisition_outcome") != "success":
                  failures.append(
                      "source_acquisition: "
                      f"outcome={run_status.get('acquisition_outcome', 'unknown')}"
                  )
              for name, return_code in run_status.get("gate_return_codes", {}).items():
                  if int(return_code) != 0:
                      failures.append(f"{name}: return_code={return_code}")
          for name, path in checks.items():
              if not path.exists():
                  failures.append(f"{name}: missing")
                  continue
              payload = json.loads(path.read_text(encoding="utf-8"))
              if any(
                  int(payload.get(key, 0)) > 0
                  for key in ("fail", "blocking_failures", "required_blocker_count")
              ):
                  failures.append(f"{name}: {payload}")
          if failures:
              Path("data/derived/source_health_failure.txt").write_text(
                  "\n".join(failures) + "\n", encoding="utf-8"
              )
              raise SystemExit("Source health monitor found blocking failures")
          print("Source health monitor passed: no blocking validation, contract, drift or release failures.")
          PY
      - name: Upload source health evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: source-health-${{ github.run_id }}
          path: |
            data/derived/source_validation/
            data/derived/source_contracts/
            data/derived/source_drift/
            data/derived/source_downloads/
            data/derived/release_readiness/
            data/derived/final_handoff/
            data/derived/source_health/
            data/derived/source_health_failure.txt
          if-no-files-found: warn
          retention-days: 30
      - name: Open or update source-health issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Source health monitor: blocking validation or drift detected"
          body="$(printf '%s\n\nRun: %s' "$(cat data/derived/source_health_failure.txt 2>/dev/null || echo 'Inspect the source-health artifact for details.')" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")"
          number="$(gh issue list --state open --search "${title} in:title" --json number,title --jq ".[] | select(.title == \"${title}\") | .number" | head -n 1)"
          if [ -n "$number" ]; then
            gh issue edit "$number" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label "type:data-quality"
          fi
      - name: Open, update or close incomplete-acquisition issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          title="Source acquisition monitor: incomplete targets"
          report_path="data/derived/source_health/acquisition_status.json"
          body_path="data/derived/source_health/acquisition_status.md"
          status="unknown"
          if [ -f "$report_path" ]; then
            status="$(python -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["status"])' "$report_path")"
          fi
          body="$(cat "$body_path" 2>/dev/null || echo 'Source acquisition status report was not generated.')"
          body="$(printf '%s\n\nRun: %s' "$body" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")"
          number="$(gh issue list --state open --search "${title} in:title" --json number,title --jq ".[] | select(.title == \"${title}\") | .number" | head -n 1)"
          if [ "$status" = "incomplete" ] || [ "$status" = "unknown" ]; then
            if [ -n "$number" ]; then
              gh issue edit "$number" --body "$body"
            else
              gh issue create --title "$title" --body "$body" --label "type:data-quality"
            fi
          elif [ -n "$number" ]; then
            gh issue close "$number" --comment "Executable source acquisition is complete; remaining rows are licence-review gates. See the generated source-health report in run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}."
          fi
