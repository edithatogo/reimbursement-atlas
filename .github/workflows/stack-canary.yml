name: Stack Canary

on:
  schedule:
    - cron: "23 4 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Sync Python dependencies
        run: uv sync --all-extras --prerelease=allow
      - name: Capture optional toolchain state
        run: uv run --all-extras python scripts/install_optional_toolchains.py
      - name: Capture external quality-gate state
        run: uv run --all-extras python scripts/run_external_quality_gates.py
      - name: Detect dashboard dependency drift
        working-directory: apps/dashboard
        run: |
          set -euo pipefail
          npm ci
          mkdir -p ../../data/derived/stack_canary
          if npm outdated --json > ../../data/derived/stack_canary/npm_outdated.json; then
            echo "Dashboard dependencies are current."
          else
            status=$?
            if [ "$status" -gt 1 ]; then
              exit "$status"
            fi
            echo "Dashboard dependencies have available updates; recorded in npm_outdated.json."
          fi
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
      - name: Run Mojo smoke
        run: uv run --all-extras bash scripts/run_mojo_smoke.sh
