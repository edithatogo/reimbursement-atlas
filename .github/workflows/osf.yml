name: OSF protocol and report publication

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload protocol/report artefacts to OSF"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

jobs:
  osf-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Generate OSF component plan
        run: |
          uv sync --all-extras
          uv run python scripts/make_osf_plan.py
          uv run python scripts/make_protocol_status.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osf-component-plan
          path: |
            data/derived/osf/
            data/derived/protocols/
            protocols/
            reports/

  publish-osf:
    needs: osf-plan
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    environment: publication-candidate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Guard token and project configuration
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_PROJECT_ID: ${{ vars.OSF_PROJECT_ID }}
        run: |
          test -n "$OSF_TOKEN"
          test -n "$OSF_PROJECT_ID"
          echo "OSF upload implementation is intentionally token-gated and should call the OSF API only after human review."
