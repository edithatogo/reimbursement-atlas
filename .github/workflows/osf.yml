name: OSF protocol and report publication

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload protocol/report artefacts to OSF"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      discover:
        description: "List accessible OSF projects into a private workflow artifact"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      provision:
        description: "Validate or create the exact Reimbursement Atlas OSF project if absent"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  group: osf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osf-discovery:
    if: ${{ github.event.inputs.discover == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: false
      - name: Install pinned OSF CLI
        run: |
          set -euo pipefail
          go install github.com/edithatogo/osf-cli-go/cmd/osf@v1.0.0
          go version -m "$(go env GOPATH)/bin/osf" | grep -F $'mod\tgithub.com/edithatogo/osf-cli-go\tv1.0.0'
      - name: List accessible projects without exposing credentials
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$OSF_TOKEN"
          mkdir -p osf-discovery
          "$(go env GOPATH)/bin/osf" projects list --output json > osf-discovery/projects.json
          jq '{schema_version:"osf-project-discovery-v1", projects:[.[] | {id,title,description,public}]}' \
            osf-discovery/projects.json > osf-discovery/projects-sanitized.json
          rm osf-discovery/projects.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osf-project-discovery
          path: osf-discovery/projects-sanitized.json
          retention-days: 7

  osf-provision:
    if: ${{ github.event.inputs.provision == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: false
      - name: Install pinned OSF CLI
        run: |
          set -euo pipefail
          go install github.com/edithatogo/osf-cli-go/cmd/osf@v1.0.0
          go version -m "$(go env GOPATH)/bin/osf" | grep -F $'mod\tgithub.com/edithatogo/osf-cli-go\tv1.0.0'
      - name: Provision exact project idempotently
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$OSF_TOKEN"
          mkdir -p osf-provision
          osf_bin="$(go env GOPATH)/bin/osf"
          title="Reimbursement Atlas"
          "$osf_bin" projects list --output json > osf-provision/projects.json
          existing="$(jq -r --arg title "$title" '.[] | select(.title == $title) | [.id, (.public // false)] | @tsv' osf-provision/projects.json | head -n 1)"
          if [ -n "$existing" ]; then
            existing_id="${existing%%$'\t'*}"
            existing_public="${existing##*$'\t'}"
            jq -n --arg id "$existing_id" --arg title "$title" --argjson public "$existing_public" \
              '{schema_version:"osf-project-provision-v1",created:false,id:$id,title:$title,public:$public}' \
              > osf-provision/project.json
          else
            "$osf_bin" projects create \
              --title "$title" \
              --description "Protocol and reproducibility workspace for the reimbursement-atlas research programme." \
              --yes --output json > osf-provision/project-raw.json
            jq --arg title "$title" \
              'if .data then .data else . end | {schema_version:"osf-project-provision-v1",created:true,id,title:$title,public:(.public // false)}' \
              osf-provision/project-raw.json > osf-provision/project.json
          fi
          test "$(jq -r '.id' osf-provision/project.json)" != "null"
          test "$(jq -r '.title' osf-provision/project.json)" = "$title"
          test "$(jq -r '.public' osf-provision/project.json)" = "true" || \
            echo "OSF project is private; public visibility remains an explicit follow-up." >&2
          rm -f osf-provision/projects.json osf-provision/project-raw.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osf-project-provision
          path: osf-provision/project.json
          retention-days: 7

  osf-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: false
      - name: Generate OSF component plan
        run: |
          uv sync --all-extras
          uv run python scripts/make_osf_plan.py
          uv run python scripts/make_protocol_status.py
      - name: Install and verify pinned OSF CLI module
        run: |
          set -euo pipefail
          go install github.com/edithatogo/osf-cli-go/cmd/osf@v1.0.0
          go version -m "$(go env GOPATH)/bin/osf" | grep -F $'mod\tgithub.com/edithatogo/osf-cli-go\tv1.0.0'
          OSF_BIN="$(go env GOPATH)/bin/osf" pixi run osf-cli-contract
          "$(go env GOPATH)/bin/osf" --help >/dev/null
      - name: Verify OSF synchronization remains fail closed
        run: |
          pixi run review-schemas
          uv run python - <<'PY'
          import json
          from pathlib import Path

          rows = [json.loads(line) for line in Path("data/derived/osf/sync_manifest.jsonl").read_text().splitlines()]
          allowed = [row for row in rows if row["publish_allowed"]]
          if len(allowed) != 11:
              raise SystemExit(f"expected 11 exact approved OSF rows, found {len(allowed)}")
          prohibited = {"papers", "preprints", "raw_live"}
          for row in allowed:
              if any(part in row["local_path"].lower() for part in prohibited):
                  raise SystemExit(f"prohibited OSF publication row: {row['local_path']}")
          PY
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osf-component-plan
          path: |
            data/derived/osf/
            data/derived/protocols/
            protocols/
            reports/
          retention-days: 30

  publish-osf:
    needs: osf-plan
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: publication-candidate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: false
      - name: Synchronize exact approved records and create registration draft
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_PROJECT_ID: ${{ vars.OSF_PROJECT_ID }}
        run: |
          set -euo pipefail
          test -n "$OSF_TOKEN"
          test -n "$OSF_PROJECT_ID"
          go install github.com/edithatogo/osf-cli-go/cmd/osf@v1.0.0
          osf_bin="$(go env GOPATH)/bin/osf"
          "$osf_bin" whoami --output json >/dev/null
          test "$(jq -s '[.[] | select(.publish_allowed == true)] | length' data/derived/osf/sync_manifest.jsonl)" -gt 0
          mkdir -p osf-publication/verified
          : > osf-publication/files.jsonl

          while IFS=$'\t' read -r id local_path checksum; do
            test -f "$local_path"
            test "$(sha256sum "$local_path" | cut -d' ' -f1)" = "$checksum"
            case "$local_path" in
              papers/*|data/raw_live/*) echo "prohibited OSF path: $local_path" >&2; exit 1 ;;
            esac
            "$osf_bin" files upload --node "$OSF_PROJECT_ID" \
              --conflict overwrite "$local_path" >/dev/null
          done < <(
            jq -r 'select(.publish_allowed == true) | [.id,.local_path,.sha256] | @tsv' \
              data/derived/osf/sync_manifest.jsonl
          )

          "$osf_bin" files list "$OSF_PROJECT_ID" --output json > osf-publication/remote-files.json
          while IFS=$'\t' read -r id local_path checksum; do
            name="$(basename "$local_path")"
            remote_id="$(jq -r --arg name "$name" '[.[] | select(.kind == "file" and .name == $name)] | if length == 1 then .[0].id else empty end' osf-publication/remote-files.json)"
            test -n "$remote_id"
            "$osf_bin" files download --file "$remote_id" \
              "osf-publication/verified/$name" --conflict overwrite >/dev/null
            test "$(sha256sum "osf-publication/verified/$name" | cut -d' ' -f1)" = "$checksum"
            jq -cn --arg id "$id" --arg path "$local_path" --arg name "$name" \
              --arg remote_id "$remote_id" --arg sha256 "$checksum" \
              '{id:$id,local_path:$path,remote_name:$name,remote_file_id:$remote_id,sha256:$sha256,verified:true}' \
              >> osf-publication/files.jsonl
          done < <(
            jq -r 'select(.publish_allowed == true) | [.id,.local_path,.sha256] | @tsv' \
              data/derived/osf/sync_manifest.jsonl
          )
          test "$(wc -l < osf-publication/files.jsonl | tr -d ' ')" = "11"

          description="Public protocol, provenance and reproducibility record for Reimbursement Atlas. Source acquisition, mapping adjudication and holdout evaluation predated registration. Papers and preprints are excluded."
          jq -cn --arg id "$OSF_PROJECT_ID" --arg description "$description" \
            '{data:{type:"nodes",id:$id,attributes:{public:true,description:$description}}}' \
            > osf-publication/project-update.json
          curl --fail --silent --show-error \
            -X PATCH "https://api.osf.io/v2/nodes/$OSF_PROJECT_ID/" \
            -H "Authorization: Bearer $OSF_TOKEN" \
            -H "Content-Type: application/vnd.api+json" \
            --data-binary @osf-publication/project-update.json \
            > osf-publication/project-response.json
          jq '{schema_version:"osf-public-project-v1",id:.data.id,title:.data.attributes.title,public:.data.attributes.public,description:.data.attributes.description}' \
            osf-publication/project-response.json > osf-publication/project.json
          test "$(jq -r '.public' osf-publication/project.json)" = "true"

          registration_title="Reimbursement Atlas repository and data record"
          curl --globoff --fail --silent --show-error \
            "https://api.osf.io/v2/nodes/$OSF_PROJECT_ID/draft_registrations/?page[size]=100" \
            -H "Authorization: Bearer $OSF_TOKEN" > osf-publication/drafts.json
          draft_id="$(jq -r --arg title "$registration_title" '[.data[] | select(.attributes.title == $title)] | first | .id // empty' osf-publication/drafts.json)"
          if [ -z "$draft_id" ]; then
            jq -cn --arg title "$registration_title" --arg description "$description" \
              --arg schema_id "5df83f7dd28338001ac0ab0d" \
              '{
                data: {
                  type: "draft_registrations",
                  attributes: {title: $title, description: $description},
                  relationships: {
                    registration_schema: {
                      data: {type: "registration_schemas", id: $schema_id}
                    }
                  }
                }
              }' > osf-publication/draft-request.json
            curl --fail --silent --show-error \
              -X POST "https://api.osf.io/v2/nodes/$OSF_PROJECT_ID/draft_registrations/" \
              -H "Authorization: Bearer $OSF_TOKEN" \
              -H "Content-Type: application/vnd.api+json" \
              --data-binary @osf-publication/draft-request.json \
              > osf-publication/draft-created.json
            draft_id="$(jq -r '.data.id // empty' osf-publication/draft-created.json)"
          fi
          test -n "$draft_id"
          jq -cn --arg id "$draft_id" --arg title "$registration_title" \
            --arg project_id "$OSF_PROJECT_ID" \
            '{schema_version:"osf-registration-draft-receipt-v1",draft_id:$id,title:$title,project_id:$project_id,status:"draft",submitted:false}' \
            > osf-publication/registration-draft.json

          rm -rf osf-publication/verified osf-publication/remote-files.json \
            osf-publication/project-update.json osf-publication/project-response.json \
            osf-publication/drafts.json osf-publication/draft-created.json \
            osf-publication/draft-request.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osf-publication-receipt
          path: osf-publication/
          retention-days: 30
