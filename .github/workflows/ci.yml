name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Validate seed data
        run: pixi run seed-validate
      - name: Validate seed CSV mirrors
        run: pixi run seed-sync-check
      - name: Lint
        run: pixi run lint
      - name: Format check
        run: pixi run format-check
      - name: Type check
        run: pixi run typecheck
      - name: Public data policy
        run: pixi run public-data-policy
      - name: Repository automation matrix
        run: pixi run repo-automation
      - name: Generate SBOMs
        run: pixi run sbom
      - name: Architecture report
        run: pixi run architecture-report
      - name: Release readiness matrix
        run: pixi run release-readiness || true
      - name: Tests with coverage
        run: pixi run coverage
      - name: External quality-gate classification
        run: pixi run external-quality-gates

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
      - name: Audit dashboard production dependencies
        working-directory: apps/dashboard
        run: npm audit --omit=dev --audit-level=moderate

  python314-runtime:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Show runtime target
        run: python --version
      - name: Sync dependencies
        run: uv sync --all-extras --prerelease=allow
      - name: Validate seed data
        run: uv run --all-extras python scripts/validate_seed_data.py
      - name: Validate seed CSV mirrors
        run: uv run --all-extras python scripts/validate_seed_sync.py
      - name: Validate public data policy
        run: uv run --all-extras python scripts/check_public_data_policy.py
      - name: Validate CLI
        run: uv run --all-extras python -m reimburse_atlas.cli validate
      - name: Mojo smoke
        run: uv run --all-extras bash scripts/run_mojo_smoke.sh
