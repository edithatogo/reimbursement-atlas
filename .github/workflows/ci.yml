name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.10.0
      - name: Validate seed data
        run: pixi run seed-validate
      - name: Validate seed CSV mirrors
        run: pixi run seed-sync-check
      - name: Lint
        run: pixi run lint
      - name: Format check
        run: pixi run format-check
      - name: Type check
        run: pixi run typecheck
      - name: Tests with coverage
        run: pixi run coverage

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm install
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
