name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python,javascript-typescript
      - uses: github/codeql-action/analyze@v4

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5

  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.10.0
      - name: Bandit
        run: pixi run bandit -r src -c pyproject.toml
      - name: pip-audit
        run: pixi run pip-audit
      - name: External quality-gate classification artifact
        run: pixi run external-quality-gates


  dashboard-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: npm audit
        working-directory: apps/dashboard
        run: npm audit --omit=dev --audit-level=moderate
