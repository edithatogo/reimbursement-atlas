name: Release readiness

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Run local CI quality gates
        run: uv run --all-extras python scripts/run_local_quality_gates.py --profile ci
      - name: External gate classification
        run: uv run --all-extras python scripts/run_external_quality_gates.py || true
      - name: Source contracts, GitHub Project export, and final handoff
        run: |
          uv run --all-extras python scripts/make_source_contracts.py
          uv run --all-extras python scripts/make_github_project_export.py
          uv run --all-extras python scripts/make_final_handoff.py
      - name: Architecture report
        run: uv run --all-extras python scripts/make_architecture_report.py
      - name: Release readiness matrix
        run: uv run --all-extras python scripts/make_release_readiness.py || true
      - name: Upload release-readiness evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-readiness
          path: |
            data/derived/local_quality_gates/
            data/derived/external_quality_gates.*
            data/derived/architecture/
            data/derived/release_readiness/
            data/derived/source_contracts/
            data/derived/github_project/
            data/derived/final_handoff/
          retention-days: 14
