name: TypeScript compatibility canary

on:
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: typescript-compatibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Check TypeScript 7 compatibility
        run: pixi run typescript-compatibility
      - name: Upload compatibility evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typescript-compatibility-${{ github.run_id }}
          path: data/derived/toolchain/typescript_compatibility.*
          if-no-files-found: error
          retention-days: 30
      - name: Open or update upgrade issue when supported
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          report="data/derived/toolchain/typescript_compatibility.json"
          test -f "$report"
          status="$(python -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["status"])' "$report")"
          if [ "$status" != "upgrade_available" ]; then
            echo "TypeScript 7 is not currently eligible for adoption: $status"
            exit 0
          fi
          title="Reassess TypeScript 7 after Astro checker peer support is available"
          body="$(cat data/derived/toolchain/typescript_compatibility.md)"
          body="$(printf '%s\n\nRun: %s' "$body" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")"
          number="$(gh issue list --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
          if [ -n "$number" ]; then
            gh issue edit "$number" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label "type:quality"
          fi
