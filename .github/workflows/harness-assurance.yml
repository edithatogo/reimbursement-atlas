name: Harness assurance

on:
  # Required property, integration, E2E and deterministic-regeneration
  # contexts must not be left pending on documentation-only pull requests.
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "13 5 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: harness-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layered-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        harness: [property, integration, e2e]
    env:
      HARNESS: ${{ matrix.harness }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Run bounded harness
        run: pixi run "$HARNESS"

  deterministic-regeneration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Regenerate deterministic evidence surfaces
        run: |
          set -euo pipefail
          pixi run schema-export
          pixi run graph-seed
          pixi run readiness
          pixi run ingestion-plan
          pixi run acquisition-plan
          pixi run vertical-slice
          pixi run source-snapshots
          pixi run repo-automation
          pixi run sbom
          pixi run architecture-report
          pixi run source-validation
          pixi run source-contracts
          pixi run historical-sources
          pixi run project-issues
          pixi run github-project-export
          pixi run final-handoff
          pixi run dashboard-status
          pixi run protocol-status
          pixi run roadmap-linkages
          pixi run data-quality
          pixi run data-dictionary
          pixi run evidence-readiness
          pixi run source-drift
          pixi run release-readiness || true
          pixi run research-package
          pixi run licence-review-queue
          pixi run licence-review-validate
          pixi run fuzzy-benchmark
          pixi run seed-lake
          pixi run dashboard-seed
      - name: Require a clean deterministic regeneration
        run: git diff --exit-code
