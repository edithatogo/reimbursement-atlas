name: Harness assurance

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/**"
  push:
    branches: [main]
  schedule:
    - cron: "13 5 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: harness-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layered-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        harness: [property, integration, e2e]
    env:
      HARNESS: ${{ matrix.harness }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Run bounded harness
        run: pixi run "$HARNESS"

  deterministic-regeneration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Regenerate deterministic evidence surfaces
        run: |
          set -euo pipefail
          pixi run schema-export
          pixi run graph-seed
          pixi run vertical-slice
          pixi run historical-sources
          pixi run protocol-status
          pixi run data-quality
          pixi run evidence-readiness
      - name: Require a clean deterministic regeneration
        run: git diff --exit-code
