name: Continuous security assurance

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "47 2 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-assurance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  secret-history:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

  reproducible-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_DATE_EPOCH: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build twice from the same locked source
        run: |
          set -euo pipefail
          uv build --out-dir dist-a
          uv build --out-dir dist-b
          find dist-a -type f -maxdepth 1 -exec basename {} \; | sort > dist-a-files.txt
          find dist-b -type f -maxdepth 1 -exec basename {} \; | sort > dist-b-files.txt
          diff -u dist-a-files.txt dist-b-files.txt
          while IFS= read -r artifact; do
            cmp "dist-a/${artifact}" "dist-b/${artifact}"
          done < dist-a-files.txt
          sha256sum dist-a/* > reproducible-build-sha256.txt
      - name: Upload reproducibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reproducible-build-evidence
          path: |
            dist-a-files.txt
            dist-b-files.txt
            reproducible-build-sha256.txt
          retention-days: 30

