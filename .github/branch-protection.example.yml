# Apply manually or with a repository-management tool when an independent trusted reviewer exists.
# This file is intentionally declarative documentation; GitHub does not consume it directly.
# The current single-maintainer repository intentionally has no required approval count.
branch: main
required_status_checks:
  strict: true
  contexts:
    - python
    - dashboard
    - python314-runtime (3.14)
    - local-quality-gates
    - generated-artifacts
    - readiness
    - seed
    - codeql
    - dependency-review
    - python-security
    - dashboard-security
    - workflow-policy
    - zizmor
    - actionlint
    - secret-history
    - reproducible-build
    - deterministic-regeneration
    - layered-tests (property)
    - layered-tests (integration)
    - layered-tests (e2e)
# Optional multi-maintainer settings:
# required_pull_request_reviews:
#   required_approving_review_count: 1
#   require_code_owner_reviews: true
#   dismiss_stale_reviews: true
#   require_last_push_approval: true
required_signatures: true
required_linear_history: true
allow_force_pushes: false
allow_deletions: false
block_creations: false
enforce_admins: true
required_conversation_resolution: true
