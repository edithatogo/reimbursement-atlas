# Apply manually or with a repository-management tool after the first GitHub push.
# This file is intentionally declarative documentation; GitHub does not consume it directly.
branch: main
required_status_checks:
  strict: true
  contexts:
    - CI / python
    - CI / dashboard
    - Security / codeql
    - Security / python-security
    - Security / dashboard-security
    - Data smoke / seed
    - Repository automation checks / generated-artifacts
    - Workflow security analysis / workflow-policy
required_pull_request_reviews:
  required_approving_review_count: 1
  require_code_owner_reviews: true
  dismiss_stale_reviews: true
required_linear_history: true
allow_force_pushes: false
allow_deletions: false
block_creations: false
enforce_admins: false
